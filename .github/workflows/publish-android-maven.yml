name: Publish Android Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-android-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate tag matches publishVersion
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PUBLISH_VERSION="$(awk -F= '/^publishVersion=/{print $2}' gradle.properties | tr -d '[:space:]')"

          if [[ -z "${PUBLISH_VERSION}" ]]; then
            echo "publishVersion was not found in gradle.properties"
            exit 1
          fi

          if [[ "${TAG_VERSION}" != "${PUBLISH_VERSION}" ]]; then
            echo "Tag version (${TAG_VERSION}) does not match publishVersion (${PUBLISH_VERSION})"
            exit 1
          fi

      - name: Validate publishing secrets
        shell: bash
        env:
          CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
          SIGNING_PRIVATE_KEY: ${{ secrets.SIGNING_PRIVATE_KEY }}
          SIGNING_PRIVATE_KEY_BASE64: ${{ secrets.SIGNING_PRIVATE_KEY_BASE64 }}
        run: |
          set -euo pipefail
          if [[ -z "${CENTRAL_PORTAL_USERNAME:-}" ]]; then
            echo "Missing required secret: CENTRAL_PORTAL_USERNAME"
            exit 1
          fi
          if [[ -z "${CENTRAL_PORTAL_PASSWORD:-}" ]]; then
            echo "Missing required secret: CENTRAL_PORTAL_PASSWORD"
            exit 1
          fi
          for required in SIGNING_KEY_ID SIGNING_PASSWORD; do
            if [[ -z "${!required:-}" ]]; then
              echo "Missing required secret: ${required}"
              exit 1
            fi
          done
          if [[ -z "${SIGNING_PRIVATE_KEY:-}" && -z "${SIGNING_PRIVATE_KEY_BASE64:-}" ]]; then
            echo "Missing signing key: set SIGNING_PRIVATE_KEY or SIGNING_PRIVATE_KEY_BASE64"
            exit 1
          fi

      - name: Prepare signing key material
        shell: bash
        env:
          SIGNING_PRIVATE_KEY: ${{ secrets.SIGNING_PRIVATE_KEY }}
          SIGNING_PRIVATE_KEY_BASE64: ${{ secrets.SIGNING_PRIVATE_KEY_BASE64 }}
        run: |
          set -euo pipefail
          if [[ -n "${SIGNING_PRIVATE_KEY:-}" ]]; then
            if ! printf "%s" "${SIGNING_PRIVATE_KEY}" | grep -q "BEGIN PGP PRIVATE KEY BLOCK"; then
              echo "SIGNING_PRIVATE_KEY does not look like an ASCII-armored private key"
              exit 1
            fi
            echo "SIGNING_KEY<<EOF" >> "${GITHUB_ENV}"
            printf "%s\n" "${SIGNING_PRIVATE_KEY}" >> "${GITHUB_ENV}"
            echo "EOF" >> "${GITHUB_ENV}"
          else
            DECODED_KEY="$(echo "${SIGNING_PRIVATE_KEY_BASE64}" | base64 --decode)"
            if ! printf "%s" "${DECODED_KEY}" | grep -q "BEGIN PGP PRIVATE KEY BLOCK"; then
              echo "SIGNING_PRIVATE_KEY_BASE64 decoded content is not a valid private key"
              exit 1
            fi
            echo "SIGNING_KEY<<EOF" >> "${GITHUB_ENV}"
            printf "%s\n" "${DECODED_KEY}" >> "${GITHUB_ENV}"
            echo "EOF" >> "${GITHUB_ENV}"
          fi

      - name: Run verification build
        run: ./gradlew --no-daemon :LetSeeCore:testDebugUnitTest :androidApp:assembleDebug

      - name: Build & sign artifacts to local staging
        env:
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
          SIGNING_KEY: ${{ env.SIGNING_KEY }}
        run: ./gradlew --no-daemon publishAllPublicationsToStagingRepository

      - name: Bundle and upload to Central Portal
        shell: bash
        env:
          CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
        run: |
          set -euo pipefail

          STAGING_DIR="build/staging-deploy"
          BUNDLE_FILE="build/central-bundle.zip"

          echo "Creating bundle zip..."
          (cd "$STAGING_DIR" && zip -r "../../$BUNDLE_FILE" .)
          echo "Bundle size: $(du -h "$BUNDLE_FILE" | cut -f1)"

          echo "Uploading to Central Portal..."
          AUTH_TOKEN="$(printf '%s:%s' "$CENTRAL_PORTAL_USERNAME" "$CENTRAL_PORTAL_PASSWORD" | base64)"

          HTTP_RESPONSE=$(curl --silent --show-error --write-out "\n%{http_code}" \
            --request POST \
            --header "Authorization: Bearer ${AUTH_TOKEN}" \
            --form "bundle=@${BUNDLE_FILE}" \
            "https://central.sonatype.com/api/v1/publisher/upload?publishingType=AUTOMATIC")

          HTTP_BODY=$(echo "$HTTP_RESPONSE" | head -n -1)
          HTTP_CODE=$(echo "$HTTP_RESPONSE" | tail -n 1)

          if [[ "$HTTP_CODE" -ge 200 && "$HTTP_CODE" -lt 300 ]]; then
            DEPLOYMENT_ID="$HTTP_BODY"
            echo "Upload OK — Deployment ID: $DEPLOYMENT_ID"
            echo "DEPLOYMENT_ID=$DEPLOYMENT_ID" >> "${GITHUB_ENV}"
          else
            echo "Upload FAILED (HTTP $HTTP_CODE): $HTTP_BODY"
            exit 1
          fi

      - name: Wait for deployment validation
        shell: bash
        env:
          CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
        run: |
          set -euo pipefail
          AUTH_TOKEN="$(printf '%s:%s' "$CENTRAL_PORTAL_USERNAME" "$CENTRAL_PORTAL_PASSWORD" | base64)"

          for i in $(seq 1 30); do
            sleep 15
            STATUS_RESPONSE=$(curl --silent --show-error \
              --request POST \
              --header "Authorization: Bearer ${AUTH_TOKEN}" \
              --header "Content-Type: application/json" \
              --data "{\"id\":\"$DEPLOYMENT_ID\",\"name\":\"\",\"deploymentState\":\"\"}" \
              "https://central.sonatype.com/api/v1/publisher/status?id=${DEPLOYMENT_ID}" 2>/dev/null || true)

            DEPLOY_STATE=$(echo "$STATUS_RESPONSE" | grep -o '"deploymentState":"[^"]*"' | head -1 | cut -d'"' -f4 || echo "UNKNOWN")
            echo "[$i/30] Status: $DEPLOY_STATE"

            case "$DEPLOY_STATE" in
              PUBLISHED)
                echo "Published successfully to Maven Central!"
                exit 0 ;;
              FAILED)
                echo "Deployment FAILED. Check Central Portal for details."
                echo "Response: $STATUS_RESPONSE"
                exit 1 ;;
            esac
          done

          echo "Timed out. Check https://central.sonatype.com/publishing/deployments"
          exit 1
