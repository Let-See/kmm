name: Publish Android Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-android-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate tag matches publishVersion
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PUBLISH_VERSION="$(awk -F= '/^publishVersion=/{print $2}' gradle.properties | tr -d '[:space:]')"

          if [[ -z "${PUBLISH_VERSION}" ]]; then
            echo "publishVersion was not found in gradle.properties"
            exit 1
          fi

          if [[ "${TAG_VERSION}" != "${PUBLISH_VERSION}" ]]; then
            echo "Tag version (${TAG_VERSION}) does not match publishVersion (${PUBLISH_VERSION})"
            exit 1
          fi

      - name: Validate publishing secrets
        shell: bash
        env:
          CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
          SIGNING_PRIVATE_KEY_BASE64: ${{ secrets.SIGNING_PRIVATE_KEY_BASE64 }}
          SIGNING_SECRET_KEY_RING_BASE64: ${{ secrets.SIGNING_SECRET_KEY_RING_BASE64 }}
        run: |
          set -euo pipefail
          if [[ -z "${CENTRAL_PORTAL_USERNAME:-}" && -z "${OSSRH_USERNAME:-}" ]]; then
            echo "Missing publishing username secret: CENTRAL_PORTAL_USERNAME or OSSRH_USERNAME"
            exit 1
          fi
          if [[ -z "${CENTRAL_PORTAL_PASSWORD:-}" && -z "${OSSRH_PASSWORD:-}" ]]; then
            echo "Missing publishing password secret: CENTRAL_PORTAL_PASSWORD or OSSRH_PASSWORD"
            exit 1
          fi

          for required in SIGNING_KEY_ID SIGNING_PASSWORD; do
            if [[ -z "${!required:-}" ]]; then
              echo "Missing required secret: ${required}"
              exit 1
            fi
          done

          if [[ -z "${SIGNING_PRIVATE_KEY_BASE64:-}" && -z "${SIGNING_SECRET_KEY_RING_BASE64:-}" ]]; then
            echo "Missing signing key material: SIGNING_PRIVATE_KEY_BASE64 (preferred) or SIGNING_SECRET_KEY_RING_BASE64 (legacy)"
            exit 1
          fi

      - name: Prepare signing key material
        shell: bash
        env:
          SIGNING_PRIVATE_KEY_BASE64: ${{ secrets.SIGNING_PRIVATE_KEY_BASE64 }}
          SIGNING_SECRET_KEY_RING_BASE64: ${{ secrets.SIGNING_SECRET_KEY_RING_BASE64 }}
        run: |
          set -euo pipefail
          if [[ -n "${SIGNING_PRIVATE_KEY_BASE64:-}" ]]; then
            echo "SIGNING_KEY<<EOF" >> "${GITHUB_ENV}"
            echo "${SIGNING_PRIVATE_KEY_BASE64}" | base64 --decode >> "${GITHUB_ENV}"
            echo "EOF" >> "${GITHUB_ENV}"
          else
            KEY_RING_PATH="${RUNNER_TEMP}/secring.gpg"
            echo "${SIGNING_SECRET_KEY_RING_BASE64}" | base64 --decode > "${KEY_RING_PATH}"
            echo "SIGNING_SECRET_KEY_RING_FILE=${KEY_RING_PATH}" >> "${GITHUB_ENV}"
          fi

      - name: Run verification build
        run: ./gradlew --no-daemon :LetSeeCore:testDebugUnitTest :androidApp:assembleDebug

      - name: Publish to Sonatype
        env:
          CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
          SIGNING_KEY: ${{ env.SIGNING_KEY }}
          SIGNING_SECRET_KEY_RING_FILE: ${{ env.SIGNING_SECRET_KEY_RING_FILE }}
        run: ./gradlew --no-daemon publish
